name: CI Pipeline

on:
  push:
    branches: [develop, feature/**]
  pull_request:
    branches: [develop]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t devops-azure-cicd:${{ github.sha }} .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-azure-cicd:${{ github.sha }}
          format: table
          exit-code: '0'

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push image to ACR
        run: |
          docker tag devops-azure-cicd:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/devops-azure-cicd:${{ github.sha }}
          docker tag devops-azure-cicd:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/devops-azure-cicd:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-azure-cicd:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-azure-cicd:latest
